<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgemux Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1ea;
        --ink: #1e1a15;
        --accent: #d26a2e;
        --panel: #fffdf9;
        --border: #e2d7c9;
        --terminal: #0f1216;
        --terminal-ink: #e6e6e6;
        --muted: #5c5348;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
        background: radial-gradient(circle at top, #fff4e6, var(--bg));
        color: var(--ink);
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 24px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }
      main {
        padding: 24px;
        display: grid;
        gap: 20px;
        max-width: 2400px;
        margin: 0 auto;
        box-sizing: border-box;
        flex: 1;
        width: 100%;
        overflow: hidden;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        min-width: 0;
        min-height: 0;
        outline: none;
        display: flex;
        flex-direction: column;
      }
      .card:focus-visible {
        border-color: var(--accent);
      }
      #sessions {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }
      .muted {
        color: var(--muted);
      }
      .small {
        font-size: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        grid-template-rows: 1fr;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .session-row {
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .session-row:last-child {
        border-bottom: none;
      }
      .session-row:hover {
        background: #faf5ef;
        margin: 0 -8px;
        padding: 10px 8px;
        border-radius: 8px;
      }
      .session-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .session-branch {
        font-weight: 600;
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }
      .badge {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #fce9d8;
        color: #8a3a10;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .badge.running {
        background: #d4edda;
        color: #155724;
      }
      .badge.errored {
        background: #f8d7da;
        color: #721c24;
      }
      .badge.waiting {
        background: #cce5ff;
        color: #004085;
      }
      .terminal {
        background: var(--terminal);
        color: var(--terminal-ink);
        border-radius: 12px;
        padding: 16px;
        flex: 1;
        min-height: 200px;
        overflow-y: auto;
        overflow-x: hidden;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.4;
      }
      .controls {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        align-items: flex-end;
      }
      .controls textarea {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
        font-size: 13px;
        resize: none;
        overflow-y: auto;
        min-height: 20px;
        max-height: 120px;
        line-height: 1.4;
      }
      .controls button {
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
        align-self: flex-end;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .archive-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 0 6px;
        cursor: pointer;
        font-size: 12px;
        color: var(--muted);
        user-select: none;
        border-top: 1px solid var(--border);
        margin-top: 8px;
      }
      .archive-header:hover {
        color: var(--ink);
      }
      .archive-toggle {
        display: inline-block;
        transition: transform 0.15s;
        font-size: 10px;
      }
      .archive-toggle.open {
        transform: rotate(90deg);
      }
      .archive-body.collapsed {
        display: none;
      }
      .session-row.archived {
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Forgemux</h1>
      <div class="muted">Live sessions and browser attach</div>
    </header>
    <main class="grid">
      <div class="card" id="sessions-card" tabindex="0">
        <strong>Sessions</strong>
        <div class="muted" id="sessions">Loading sessions...</div>
      </div>
      <div class="card">
        <strong>Attach</strong>
        <div class="muted" id="attach-help">Select a session to attach.</div>
        <div class="terminal" id="terminal">Waiting for session...</div>
        <div class="controls">
          <textarea
            id="input"
            rows="1"
            placeholder="Send input (Enter to send, Shift+Enter for newline)"
          ></textarea>
          <button id="send">Send</button>
        </div>
        <div class="status" id="ws-status">WebSocket idle.</div>
      </div>
    </main>
    <script>
      const sessionsEl = document.getElementById("sessions");
      const terminalEl = document.getElementById("terminal");
      const statusEl = document.getElementById("ws-status");
      const attachHelp = document.getElementById("attach-help");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      let attachSocket = null;
      let currentSessionId = null;
      let pendingInputs = [];
      let lastTerminalData = null;
      let lastSessionsJson = null;
      let sessionsInteracting = false;
      let deferredSessions = null;
      const sessionsCard = document.getElementById("sessions-card");

      function setSessionsInteracting(active) {
        sessionsInteracting = active;
        if (!active && deferredSessions) {
          renderSessions(deferredSessions);
          deferredSessions = null;
        }
      }

      sessionsCard.addEventListener("mouseenter", () => setSessionsInteracting(true));
      sessionsCard.addEventListener("mouseleave", () => {
        if (!sessionsCard.contains(document.activeElement)) setSessionsInteracting(false);
      });
      sessionsCard.addEventListener("focusin", () => setSessionsInteracting(true));
      sessionsCard.addEventListener("focusout", (e) => {
        if (!sessionsCard.contains(e.relatedTarget) && !sessionsCard.matches(":hover"))
          setSessionsInteracting(false);
      });

      // --- ANSI color support ---
      const ANSI_COLORS = [
        "#000", "#c00", "#0a0", "#c50", "#00c", "#c0c", "#0cc", "#ccc",
        "#555", "#f55", "#5f5", "#ff5", "#55f", "#f5f", "#5ff", "#fff",
      ];

      function ansiToHtml(text) {
        let html = "";
        let i = 0;
        let openSpans = 0;
        while (i < text.length) {
          if (text[i] === "\x1b" && text[i + 1] === "[") {
            let j = i + 2;
            while (j < text.length && text[j] !== "m" && j - i < 20) j++;
            if (text[j] === "m") {
              const codes = text
                .slice(i + 2, j)
                .split(";")
                .map((c) => parseInt(c, 10) || 0);
              const styles = ansiCodesToStyle(codes);
              if (styles === null) {
                while (openSpans > 0) {
                  html += "</span>";
                  openSpans--;
                }
              } else if (styles) {
                html += `<span style="${styles}">`;
                openSpans++;
              }
              i = j + 1;
              continue;
            }
          }
          if (text[i] === "&") html += "&amp;";
          else if (text[i] === "<") html += "&lt;";
          else if (text[i] === ">") html += "&gt;";
          else html += text[i];
          i++;
        }
        while (openSpans > 0) {
          html += "</span>";
          openSpans--;
        }
        return html;
      }

      function ansiCodesToStyle(codes) {
        if (codes.length === 1 && codes[0] === 0) return null;
        let parts = [];
        for (let ci = 0; ci < codes.length; ci++) {
          const c = codes[ci];
          if (c === 0) return null;
          else if (c === 1) parts.push("font-weight:bold");
          else if (c === 2) parts.push("opacity:0.7");
          else if (c === 3) parts.push("font-style:italic");
          else if (c === 4) parts.push("text-decoration:underline");
          else if (c === 7) parts.push("filter:invert(1)");
          else if (c === 9) parts.push("text-decoration:line-through");
          else if (c >= 30 && c <= 37) parts.push(`color:${ANSI_COLORS[c - 30]}`);
          else if (c === 38 && codes[ci + 1] === 5) {
            parts.push(`color:${color256(codes[ci + 2])}`);
            ci += 2;
          } else if (c === 38 && codes[ci + 1] === 2) {
            parts.push(`color:rgb(${codes[ci + 2]},${codes[ci + 3]},${codes[ci + 4]})`);
            ci += 4;
          } else if (c >= 40 && c <= 47) parts.push(`background:${ANSI_COLORS[c - 40]}`);
          else if (c === 48 && codes[ci + 1] === 5) {
            parts.push(`background:${color256(codes[ci + 2])}`);
            ci += 2;
          } else if (c === 48 && codes[ci + 1] === 2) {
            parts.push(`background:rgb(${codes[ci + 2]},${codes[ci + 3]},${codes[ci + 4]})`);
            ci += 4;
          } else if (c >= 90 && c <= 97) parts.push(`color:${ANSI_COLORS[c - 90 + 8]}`);
          else if (c >= 100 && c <= 107) parts.push(`background:${ANSI_COLORS[c - 100 + 8]}`);
          else if (c === 39) parts.push("color:inherit");
          else if (c === 49) parts.push("background:inherit");
        }
        return parts.length ? parts.join(";") : "";
      }

      function color256(n) {
        if (n == null) return "inherit";
        if (n < 16) return ANSI_COLORS[n];
        if (n >= 232) {
          const g = 8 + (n - 232) * 10;
          return `rgb(${g},${g},${g})`;
        }
        const idx = n - 16;
        const r = Math.floor(idx / 36);
        const g = Math.floor((idx % 36) / 6);
        const b = idx % 6;
        const map = [0, 95, 135, 175, 215, 255];
        return `rgb(${map[r]},${map[g]},${map[b]})`;
      }

      function trimCapture(text) {
        return text.replace(/^(\s*\n)+/, "").replace(/(\n\s*)+$/, "");
      }

      // --- Session list ---
      function branchFromRepo(repoRoot) {
        if (!repoRoot) return null;
        const wt = "/worktrees/";
        const idx = repoRoot.indexOf(wt);
        if (idx !== -1) return repoRoot.slice(idx + wt.length);
        const parts = repoRoot.split("/");
        return parts[parts.length - 1] || repoRoot;
      }

      function badgeClass(state) {
        const s = (state || "").toLowerCase();
        if (s === "running") return "badge running";
        if (s === "errored") return "badge errored";
        if (s === "waitinginput") return "badge waiting";
        return "badge";
      }

      function timeAgo(dateStr) {
        if (!dateStr) return "";
        const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
        if (diff < 60) return "just now";
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      let archiveOpen = false;

      function isArchived(state) {
        const s = (state || "").toLowerCase();
        return s === "terminated" || s === "errored";
      }

      function makeSessionRow(session, archived) {
        const branch = branchFromRepo(session.repo_root);
        const row = document.createElement("div");
        row.className = archived ? "session-row archived" : "session-row";
        row.dataset.id = session.id;
        row.innerHTML = `
          <div class="session-header">
            <span class="session-branch" title="${escapeHtml(session.repo_root || "")}">${escapeHtml(branch || session.id)}</span>
            <span class="${badgeClass(session.state)}">${escapeHtml(session.state)}</span>
          </div>
          <div class="session-meta">
            ${escapeHtml(session.id)} &middot; ${escapeHtml(session.agent)} ${escapeHtml(session.model)} &middot; ${timeAgo(session.last_activity_at)}
          </div>
        `;
        row.addEventListener("click", () => attachSession(session.id));
        return row;
      }

      function updateRow(row, session) {
        const badge = row.querySelector(".badge");
        if (badge) {
          badge.className = badgeClass(session.state);
          badge.textContent = session.state;
        }
        const meta = row.querySelector(".session-meta");
        if (meta) {
          meta.innerHTML =
            `${escapeHtml(session.id)} &middot; ${escapeHtml(session.agent)} ${escapeHtml(session.model)} &middot; ${timeAgo(session.last_activity_at)}`;
        }
      }

      function renderSessions(sessions) {
        if (!sessions.length) {
          sessionsEl.textContent = "No sessions found.";
          return;
        }

        const active = sessions.filter((s) => !isArchived(s.state));
        const archived = sessions.filter((s) => isArchived(s.state));
        const existingRows = sessionsEl.querySelectorAll(".session-row[data-id]");
        const existingIds = new Set();
        existingRows.forEach((r) => existingIds.add(r.dataset.id));
        const newActiveIds = new Set(active.map((s) => s.id));
        const newArchivedIds = new Set(archived.map((s) => s.id));
        const newAllIds = new Set([...newActiveIds, ...newArchivedIds]);

        // Check if we can do an in-place update (same set of ids, same partitioning)
        let canPatch = existingIds.size === newAllIds.size;
        if (canPatch) {
          for (const id of existingIds) {
            if (!newAllIds.has(id)) { canPatch = false; break; }
          }
        }
        if (canPatch) {
          // Check partitioning hasn't changed (active vs archived)
          for (const row of existingRows) {
            const isArc = row.classList.contains("archived");
            const shouldBeArc = newArchivedIds.has(row.dataset.id);
            if (isArc !== shouldBeArc) { canPatch = false; break; }
          }
        }

        if (canPatch) {
          // In-place update: just patch text in existing rows
          const byId = new Map(sessions.map((s) => [s.id, s]));
          existingRows.forEach((row) => updateRow(row, byId.get(row.dataset.id)));
          // Update archive count
          const archiveHeader = sessionsEl.querySelector(".archive-header");
          if (archiveHeader && archived.length) {
            archiveHeader.innerHTML = `<span class="archive-toggle ${archiveOpen ? "open" : ""}">&#9654;</span> Archived (${archived.length})`;
          }
          return;
        }

        // Full rebuild
        const frag = document.createDocumentFragment();

        if (active.length) {
          active.forEach((s) => frag.appendChild(makeSessionRow(s, false)));
        } else {
          const msg = document.createElement("div");
          msg.className = "muted small";
          msg.style.padding = "10px 0";
          msg.textContent = "No active sessions.";
          frag.appendChild(msg);
        }

        if (archived.length) {
          const header = document.createElement("div");
          header.className = "archive-header";
          header.innerHTML = `<span class="archive-toggle ${archiveOpen ? "open" : ""}">&#9654;</span> Archived (${archived.length})`;
          const body = document.createElement("div");
          body.className = archiveOpen ? "archive-body" : "archive-body collapsed";
          archived.forEach((s) => body.appendChild(makeSessionRow(s, true)));
          header.addEventListener("click", () => {
            archiveOpen = !archiveOpen;
            body.classList.toggle("collapsed", !archiveOpen);
            header.querySelector(".archive-toggle").classList.toggle("open", archiveOpen);
          });
          frag.appendChild(header);
          frag.appendChild(body);
        }

        sessionsEl.innerHTML = "";
        sessionsEl.appendChild(frag);
      }

      // --- Attach ---
      function attachSession(id) {
        currentSessionId = id;
        lastTerminalData = null;
        if (attachSocket) {
          attachSocket.close();
        }
        attachHelp.textContent = `Attached to ${id}`;
        terminalEl.innerHTML = "Connecting...";
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(
          `${protocol}://${location.host}/sessions/${id}/attach`
        );
        attachSocket = ws;
        ws.addEventListener("open", () => {
          if (attachSocket !== ws) return;
          statusEl.textContent = "Attached. Waiting for data...";
          ws.send(
            JSON.stringify({ type: "resume", last_seen_event_id: 0 })
          );
          flushPending();
        });
        ws.addEventListener("message", (event) => {
          if (attachSocket !== ws) return;
          try {
            const payload = JSON.parse(event.data);
            if (payload.type === "snapshot" || payload.type === "event") {
              const trimmed = trimCapture(payload.data);
              if (trimmed !== lastTerminalData) {
                lastTerminalData = trimmed;
                terminalEl.innerHTML = ansiToHtml(trimmed);
                terminalEl.scrollTop = terminalEl.scrollHeight;
              }
            }
            if (payload.type === "ack") {
              statusEl.textContent = `Input ${payload.input_id} acked`;
            }
          } catch (e) {
            terminalEl.textContent = event.data;
          }
        });
        ws.addEventListener("close", () => {
          if (attachSocket !== ws) return;
          statusEl.textContent = "Attach socket closed.";
          if (currentSessionId) {
            setTimeout(() => attachSession(currentSessionId), 1500);
          }
        });
      }

      // --- Input handling ---
      function sendInput() {
        const value = inputEl.value;
        if (!value) return;
        const inputId = Math.random().toString(36).slice(2);
        const payload = JSON.stringify({
          type: "input",
          input_id: inputId,
          data: value + "\n",
        });
        if (!attachSocket || attachSocket.readyState !== WebSocket.OPEN) {
          pendingInputs.push(payload);
          statusEl.textContent = `Queued ${inputId} (offline)`;
        } else {
          attachSocket.send(payload);
          statusEl.textContent = `Sent ${inputId}`;
        }
        inputEl.value = "";
        inputEl.style.height = "auto";
      }

      sendBtn.addEventListener("click", sendInput);

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendInput();
        }
      });

      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });

      function flushPending() {
        if (!attachSocket || attachSocket.readyState !== WebSocket.OPEN) return;
        if (!pendingInputs.length) return;
        pendingInputs.forEach((payload) => attachSocket.send(payload));
        pendingInputs = [];
        statusEl.textContent = "Sent queued inputs.";
      }

      // --- Sessions WebSocket ---
      function connectSessionsSocket() {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${location.host}/sessions/ws`);
        ws.addEventListener("message", (event) => {
          try {
            if (event.data === lastSessionsJson) return;
            lastSessionsJson = event.data;
            const sessions = JSON.parse(event.data);
            if (sessionsInteracting) {
              deferredSessions = sessions;
            } else {
              renderSessions(sessions);
            }
          } catch (e) {
            sessionsEl.textContent = "Failed to parse sessions.";
          }
        });
        ws.addEventListener("close", () => {
          setTimeout(connectSessionsSocket, 2000);
        });
      }

      connectSessionsSocket();
    </script>
  </body>
</html>
