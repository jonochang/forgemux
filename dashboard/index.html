<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgemux Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f2;
        --ink: #1c1b1a;
        --accent: #d26a2e;
        --panel: #ffffff;
        --border: #e0d8cf;
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
        background: radial-gradient(circle at top, #fff4e6, var(--bg));
        color: var(--ink);
      }
      header {
        padding: 24px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      main {
        padding: 24px;
        display: grid;
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .muted {
        color: #5c5348;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Forgemux</h1>
      <div class="muted">Dashboard placeholder</div>
    </header>
    <main>
      <div class="card">
        <strong>Sessions</strong>
        <div class="muted" id="sessions">Loading sessions...</div>
      </div>
      <div class="card">
        <strong>Terminal</strong>
        <div class="muted" id="ws-status">Web terminal attach placeholder (Phase 3).</div>
      </div>
    </main>
    <script>
      const sessionsEl = document.getElementById("sessions");
      fetch("/sessions")
        .then((res) => res.json())
        .then((sessions) => {
          if (!sessions.length) {
            sessionsEl.textContent = "No sessions found.";
            return;
          }
          const lines = sessions.map(
            (s) => `${s.id} • ${s.agent} • ${s.model} • ${s.state}`
          );
          sessionsEl.textContent = lines.join(" | ");
        })
        .catch(() => {
          sessionsEl.textContent = "Failed to load sessions.";
        });

      const statusEl = document.getElementById("ws-status");
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${protocol}://${location.host}/ws`);
      ws.addEventListener("open", () => {
        statusEl.textContent = "WebSocket connected.";
        ws.send("ping");
      });
      ws.addEventListener("message", (event) => {
        statusEl.textContent = `WebSocket echo: ${event.data}`;
      });
      ws.addEventListener("close", () => {
        statusEl.textContent = "WebSocket disconnected.";
      });
    </script>
  </body>
</html>
